name: Publish to ClawHub

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Publish Skill to ClawHub
      run: |
        npx clawhub publish . \
          --slug interview-prep \
          --name "面试准备助手" \
          --version 1.0.0 \
          --changelog "首次发布：根据JD和简历预测面试题"
      env:
        CLAWHUB_TOKEN: clh_7XoVicLp7wOMpsUzmjCLHJ-UPKS3Fuxgxdl6NhNA4HU
